<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenEMS 策略管理</title>
<link rel="stylesheet" href="/assets/admin.css">
<style>
  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tabs button { padding: 8px 16px; border: 1px solid var(--border); border-radius: 10px; background: transparent; color: var(--text); cursor: pointer; }
  .tabs button.active { background: var(--accent); color: #081018; border-color: var(--accent); }
  .stack { display: grid; gap: 16px; }
  .strategy-card { border: 1px solid var(--border); border-radius: 14px; background: rgba(18, 23, 31, 0.65); padding: 18px; }
  .strategy-card-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 14px; }
  .strategy-name { font-size: 18px; font-weight: 700; }
  .strategy-meta { color: var(--muted); font-size: 13px; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 700; }
  .badge.enabled { background: rgba(34, 197, 94, 0.16); color: #4ade80; }
  .badge.disabled { background: rgba(148, 163, 184, 0.16); color: #94a3b8; }
  .badge.warn { background: rgba(245, 158, 11, 0.16); color: #fbbf24; }
  .kv-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 16px; }
  .kv { display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: start; }
  .kv-key { color: var(--muted); font-size: 13px; }
  .kv-value { font-weight: 600; word-break: break-word; }
  .section-block { margin-top: 16px; }
  .section-title-sm { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
  .chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: inline-flex; gap: 6px; align-items: center; border: 1px solid var(--border); border-radius: 999px; padding: 6px 10px; font-size: 12px; background: rgba(15, 23, 32, 0.75); }
  .chip-role { color: var(--muted); }
  .table-wrap { overflow: auto; }
  .log-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .log-table th, .log-table td { padding: 8px 10px; text-align: left; border-bottom: 1px solid var(--border); vertical-align: top; }
  .log-table th { color: var(--muted); font-weight: 600; }
  .muted { color: var(--muted); }
  .status-ok { color: #4ade80; }
  .status-warn { color: #fbbf24; }
  .status-error { color: #f87171; }
  @media (max-width: 960px) {
    .kv-grid { grid-template-columns: 1fr; }
    .kv { grid-template-columns: 1fr; gap: 4px; }
    .strategy-card-header { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="app-shell">
  <aside class="side-nav">
    <a class="brand" href="/dashboard">OpenEMS</a>
    <div class="nav-meta">
      <div>单站运维后台</div>
      <div>实时、告警、配置、审计一体化</div>
    </div>
    <nav class="nav-group">
      <a class="nav-link" data-page="dashboard" href="/dashboard">首页看板</a>
      <a class="nav-link" data-page="alarms" href="/alarms">告警管理</a>
      <a class="nav-link" data-page="history" href="/history">历史查询</a>
      <a class="nav-link" data-page="config" href="/config">配置概览</a>
      <a class="nav-link" data-page="comm" href="/comm">配置管理</a>
      <a class="nav-link" data-page="topology" href="/topology">拓扑管理</a>
      <a class="nav-link" data-page="strategy" href="/strategy">策略管理</a>
      <a class="nav-link" data-page="system" href="/system">系统监控</a>
      <a class="nav-link admin-only" data-page="users" href="/users">用户管理</a>
      <a class="nav-link admin-only" data-page="audit" href="/audit">审计日志</a>
    </nav>
    <div class="side-footer">
      <div class="status-line">当前用户：<strong id="current-username">-</strong> <span id="current-role"></span></div>
      <button id="logout-btn" class="secondary">退出登录</button>
    </div>
  </aside>
  <div class="main-shell">
    <header class="topbar">
      <div>
        <div class="page-title">策略管理</div>
        <div class="page-subtitle">当前已支持防逆流、SOC 保护和高 SOC 条件下的光伏限功率补偿。</div>
      </div>
    </header>
    <main class="page-content">
      <div class="tabs">
        <button class="active" data-tab="status">运行状态</button>
        <button data-tab="logs">动作日志</button>
        <button data-tab="config">策略配置</button>
      </div>

      <section id="tab-status" class="stack"></section>

      <section id="tab-logs" style="display:none">
        <div class="table-card">
          <div class="table-card-header">
            <div>
              <div class="section-title">策略动作日志</div>
              <div class="section-subtitle">查看最近的策略下发、抑制和光伏限发恢复记录。</div>
            </div>
            <button id="refresh-logs" class="button secondary">刷新</button>
          </div>
          <div class="table-card-body">
            <div class="table-wrap">
              <table class="log-table">
                <thead>
                  <tr>
                    <th>时间</th>
                    <th>策略</th>
                    <th>动作</th>
                    <th>目标点位</th>
                    <th>目标值</th>
                    <th>结果</th>
                    <th>原因</th>
                    <th>详情</th>
                  </tr>
                </thead>
                <tbody id="log-rows"></tbody>
              </table>
            </div>
          </div>
        </div>
      </section>

      <section id="tab-config" style="display:none" class="stack"></section>
    </main>
  </div>
</div>
<script src="/assets/admin.js"></script>
<script>
(function () {
  const role = sessionStorage.getItem('_role') || 'viewer';
  document.getElementById('current-username').textContent = sessionStorage.getItem('_username') || '-';
  document.getElementById('current-role').textContent = '(' + role + ')';

  document.querySelectorAll('.nav-link').forEach(function (a) { a.classList.remove('active'); });
  const navLink = document.querySelector('.nav-link[data-page="strategy"]');
  if (navLink) navLink.classList.add('active');

  document.getElementById('logout-btn').addEventListener('click', function () {
    fetch('/api/auth/logout', { method: 'POST' }).then(function () { location.href = '/login'; });
  });

  document.querySelectorAll('.tabs button').forEach(function (btn) {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.tabs button').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('tab-status').style.display = tab === 'status' ? '' : 'none';
      document.getElementById('tab-logs').style.display = tab === 'logs' ? '' : 'none';
      document.getElementById('tab-config').style.display = tab === 'config' ? '' : 'none';
      if (tab === 'status') loadStatus();
      if (tab === 'logs') loadLogs();
      if (tab === 'config') loadConfig();
    });
  });

  document.getElementById('refresh-logs').addEventListener('click', loadLogs);

  function esc(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderBindings(bindings) {
    if (!bindings || !bindings.length) return '<div class="muted">未配置绑定</div>';
    return '<div class="chip-list">' + bindings.map(function (binding) {
      return '<div class="chip"><span class="chip-role">' + esc(binding.role) + '</span><span>' + esc(binding.point_id) + '</span></div>';
    }).join('') + '</div>';
  }

  function renderParams(params) {
    const entries = Object.entries(params || {});
    if (!entries.length) return '<div class="muted">未配置参数</div>';
    return '<div class="chip-list">' + entries.map(function (entry) {
      return '<div class="chip"><span class="chip-role">' + esc(entry[0]) + '</span><span>' + esc(entry[1]) + '</span></div>';
    }).join('') + '</div>';
  }

  function loadStatus() {
    fetch('/api/strategy/runtime')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        const rows = data.rows || [];
        const root = document.getElementById('tab-status');
        if (!rows.length) {
          root.innerHTML = '<div class="card"><div class="muted">暂无运行中的策略状态。</div></div>';
          return;
        }
        root.innerHTML = rows.map(function (row) {
          const overridden = row.manual_override_until ? new Date(row.manual_override_until) > new Date() : false;
          const statusClass = row.suppressed ? 'status-warn' : 'status-ok';
          return '' +
            '<article class="strategy-card">' +
              '<div class="strategy-card-header">' +
                '<div>' +
                  '<div class="strategy-name">' + esc(row.name) + '</div>' +
                  '<div class="strategy-meta">' + esc(row.strategy_id || row.id || '') + ' · ' + esc(row.type) + ' · 设备 ' + esc(row.device_id || '-') + '</div>' +
                '</div>' +
                '<div>' +
                  '<span class="badge ' + (row.enabled ? 'enabled' : 'disabled') + '">' + (row.enabled ? '启用' : '禁用') + '</span> ' +
                  (overridden ? '<span class="badge warn">人工接管中</span>' : '') +
                '</div>' +
              '</div>' +
              '<div class="kv-grid">' +
                '<div class="kv"><div class="kv-key">当前目标值</div><div class="kv-value">' + esc(row.current_target_value == null ? '-' : row.current_target_value) + '</div></div>' +
                '<div class="kv"><div class="kv-key">当前目标点位</div><div class="kv-value">' + esc(row.current_target_point_id || '-') + '</div></div>' +
                '<div class="kv"><div class="kv-key">是否抑制</div><div class="kv-value ' + statusClass + '">' + (row.suppressed ? '是' : '否') + '</div></div>' +
                '<div class="kv"><div class="kv-key">抑制原因</div><div class="kv-value">' + esc(row.suppress_reason || '-') + '</div></div>' +
                '<div class="kv"><div class="kv-key">人工接管截止</div><div class="kv-value">' + esc(row.manual_override_until || '-') + '</div></div>' +
                '<div class="kv"><div class="kv-key">最后执行时间</div><div class="kv-value">' + esc(row.last_execution_time || '-') + '</div></div>' +
                '<div class="kv"><div class="kv-key">最后错误</div><div class="kv-value ' + (row.last_error ? 'status-error' : '') + '">' + esc(row.last_error || '-') + '</div></div>' +
                '<div class="kv"><div class="kv-key">输入摘要</div><div class="kv-value">' + esc(JSON.stringify(row.input_summary || {})) + '</div></div>' +
              '</div>' +
            '</article>';
        }).join('');
      });
  }

  function loadLogs() {
    fetch('/api/strategy/logs?limit=200')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        const rows = data.rows || [];
        document.getElementById('log-rows').innerHTML = rows.length ? rows.map(function (row) {
          const resultClass = row.result === 'ok' ? 'status-ok' : (row.result === 'failed' ? 'status-error' : 'status-warn');
          return '' +
            '<tr>' +
              '<td>' + esc(row.created_at || '-') + '</td>' +
              '<td>' + esc(row.strategy_id) + '</td>' +
              '<td>' + esc(row.action_type) + '</td>' +
              '<td>' + esc(row.target_point_id || '-') + '</td>' +
              '<td>' + esc(row.desired_value == null ? '-' : row.desired_value) + '</td>' +
              '<td class="' + resultClass + '">' + esc(row.result || '-') + '</td>' +
              '<td>' + esc(row.suppress_reason || '-') + '</td>' +
              '<td>' + esc(row.details || '-') + '</td>' +
            '</tr>';
        }).join('') : '<tr><td colspan="8" class="muted">暂无日志</td></tr>';
      });
  }

  function loadConfig() {
    fetch('/api/strategy')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        const rows = data.rows || [];
        const root = document.getElementById('tab-config');
        if (!rows.length) {
          root.innerHTML = '<div class="card"><div class="muted">暂无策略配置。</div></div>';
          return;
        }
        root.innerHTML = rows.map(function (row) {
          return '' +
            '<article class="strategy-card">' +
              '<div class="strategy-card-header">' +
                '<div>' +
                  '<div class="strategy-name">' + esc(row.name) + '</div>' +
                  '<div class="strategy-meta">' + esc(row.id) + ' · ' + esc(row.type) + ' · 设备 ' + esc(row.device_id || '-') + '</div>' +
                '</div>' +
                '<div><span class="badge ' + (row.enabled ? 'enabled' : 'disabled') + '">' + (row.enabled ? '启用' : '禁用') + '</span></div>' +
              '</div>' +
              '<div class="kv-grid">' +
                '<div class="kv"><div class="kv-key">站点</div><div class="kv-value">' + esc(row.site_id || '-') + '</div></div>' +
                '<div class="kv"><div class="kv-key">优先级</div><div class="kv-value">' + esc(row.priority) + '</div></div>' +
                '<div class="kv"><div class="kv-key">执行周期</div><div class="kv-value">' + esc(row.cycle_ms) + ' ms</div></div>' +
                '<div class="kv"><div class="kv-key">说明</div><div class="kv-value">当前支持防逆流、SOC 保护和光伏限发补偿。</div></div>' +
              '</div>' +
              '<div class="section-block">' +
                '<div class="section-title-sm">绑定点位</div>' +
                renderBindings(row.bindings || []) +
              '</div>' +
              '<div class="section-block">' +
                '<div class="section-title-sm">参数</div>' +
                renderParams(row.params || {}) +
              '</div>' +
            '</article>';
        }).join('');
      });
  }

  loadStatus();
})();
</script>
</body>
</html>
