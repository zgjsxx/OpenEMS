<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenEMS Dashboard</title>
<style>
  :root {
    --bg: #1a1d23;
    --card-bg: #22262e;
    --border: #3a3f4a;
    --text: #e0e4eb;
    --text-muted: #8a8f9a;
    --accent: #4fc3f7;
    --good: #4caf50;
    --questionable: #ff9800;
    --bad: #f44336;
    --invalid: #9e9e9e;
    --header-bg: #0d1117;
    --cmd-bg: #2a3040;
    --cmd-border: #4fc3f7;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
  }
  .layout-shell {
    min-width: 1360px;
  }
  /* Header */
  .site-header {
    background: var(--header-bg);
    border-bottom: 2px solid var(--accent);
    padding: 16px 24px;
    display: flex; align-items: center; gap: 16px;
  }
  .site-header h1 {
    font-size: 22px; font-weight: 600; color: var(--accent);
  }
  .site-header .site-info {
    font-size: 14px; color: var(--text-muted);
  }
  .site-header .site-info span { margin-left: 12px; }
  .site-header .header-actions {
    margin-left: auto;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .site-header .header-link {
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(79,195,247,0.35);
    border-radius: 999px;
    padding: 7px 12px;
    transition: background 0.2s ease, border-color 0.2s ease;
  }
  .site-header .header-link:hover {
    background: rgba(79,195,247,0.12);
    border-color: rgba(79,195,247,0.6);
  }
  /* Status bar */
  .status-bar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 8px 24px;
    display: flex; align-items: center; gap: 20px;
    font-size: 13px; color: var(--text-muted);
  }
  .status-bar .conn-dot {
    width: 10px; height: 10px; border-radius: 50%; display: inline-block;
  }
  .conn-dot.ok { background: var(--good); }
  .conn-dot.err { background: var(--bad); }
  .conn-dot.wait { background: var(--questionable); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }
  /* Active alarms */
  .alarm-panel {
    margin: 12px 24px 0;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    max-width: 760px;
  }
  .alarm-panel-header {
    background: #2c3040;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .alarm-panel-title {
    font-size: 14px;
    font-weight: 700;
  }
  .alarm-count {
    font-size: 12px;
    color: var(--text-muted);
  }
  .alarm-empty {
    padding: 12px 14px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .alarm-list {
    display: flex;
    flex-direction: column;
  }
  .alarm-row {
    display: grid;
    grid-template-columns: 86px 150px 1fr 96px 150px;
    gap: 10px;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid #2a2e36;
    font-size: 12px;
  }
  .alarm-row:last-child { border-bottom: none; }
  .alarm-level {
    justify-self: start;
    border-radius: 4px;
    padding: 2px 8px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .alarm-level.warning { background: rgba(255,152,0,0.2); color: var(--questionable); }
  .alarm-level.critical { background: rgba(244,67,54,0.22); color: var(--bad); }
  .alarm-point { color: var(--accent); font-weight: 600; }
  .alarm-msg { color: var(--text); }
  .alarm-value, .alarm-time {
    color: var(--text-muted);
    white-space: nowrap;
  }
  /* Main grid */
  .main-grid {
    padding: 20px 24px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    align-items: start;
    justify-items: start;
  }
  /* Device card */
  .device-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    max-width: 760px;
    width: 100%;
  }
  .device-card-header {
    background: #2c3040;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .device-card-header .device-icon {
    font-size: 20px;
  }
  .device-card-header .device-name {
    font-size: 16px; font-weight: 600;
  }
  .device-card-header .device-id {
    font-size: 12px; color: var(--text-muted); margin-left: auto;
  }
  .device-card-body {
    padding: 12px 16px;
    --row-template: 200px 78px 20px 92px 52px 48px 48px 176px;
  }
  /* Point row */
  .point-row {
    display: grid;
    grid-template-columns: var(--row-template);
    align-items: center;
    gap: 6px;
    padding: 5px 0;
    border-bottom: 1px solid #2a2e36;
  }
  .point-row:last-child { border-bottom: none; }
  .point-label {
    font-size: 13px; color: var(--text-muted); min-width: 0;
  }
  .point-value {
    grid-column: 2;
    font-size: 15px; font-weight: 600; min-width: 0; text-align: right;
  }
  .point-unit {
    grid-column: 3;
    font-size: 12px; color: var(--text-muted); min-width: 0;
  }
  .point-quality {
    grid-column: 7;
    justify-self: start;
    font-size: 11px;
    padding: 2px 8px; border-radius: 4px; font-weight: 600;
  }
  .quality-Good { background: rgba(76,175,80,0.2); color: var(--good); }
  .quality-Questionable { background: rgba(255,152,0,0.2); color: var(--questionable); }
  .quality-Bad { background: rgba(244,67,54,0.2); color: var(--bad); }
  .quality-Invalid { background: rgba(158,158,158,0.2); color: var(--invalid); }
  /* Invalid/offline value */
  .value-invalid { color: var(--text-muted); text-decoration: line-through; }
  .value-valid { color: var(--text); }
  /* Teleindication state */
  .ti-state {
    grid-column: 2 / span 2;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .ti-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .ti-dot.on { background: var(--good); }
  .ti-dot.off { background: var(--bad); }
  .ti-dot.unknown { background: var(--invalid); }
  .ti-code { font-size: 14px; font-weight: 600; }
  /* Timestamp */
  .point-ts {
    grid-column: 8;
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: clip;
  }
  /* Error overlay */
  .error-overlay {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(244,67,54,0.9); color: #fff;
    padding: 12px 24px; border-radius: 8px; font-size: 14px;
    z-index: 100; display: none;
  }
  /* No data message */
  .no-data {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .no-data h2 { font-size: 18px; margin-bottom: 8px; }
  .no-data p { font-size: 14px; }
  /* Command UI */
  .cmd-row {
    display: grid;
    grid-template-columns: var(--row-template);
    align-items: center;
    gap: 6px;
    padding: 5px 0;
    border-bottom: 1px solid #2a2e36;
  }
  .cmd-row:last-child { border-bottom: none; }
  .cmd-label {
    font-size: 13px; color: var(--text-muted); min-width: 0;
    word-break: break-word;
  }
  .cmd-value {
    font-size: 15px; font-weight: 600; min-width: 0; text-align: right;
  }
  .cmd-unit {
    font-size: 12px; color: var(--text-muted); min-width: 0;
  }
  .cmd-input {
    width: 100%; max-width: 92px; min-width: 0; padding: 3px 6px; font-size: 12px;
    background: var(--cmd-bg); border: 1px solid var(--cmd-border);
    border-radius: 4px; color: var(--text); text-align: right;
    justify-self: start;
  }
  .cmd-btn {
    width: 52px;
    min-width: 52px;
    padding: 3px 8px; font-size: 12px; font-weight: 600;
    background: var(--accent); border: none; border-radius: 4px;
    color: #fff; cursor: pointer;
  }
  .cmd-btn:hover { background: #3da8d9; }
  .cmd-btn:disabled { background: var(--text-muted); cursor: not-allowed; }
  .cmd-status {
    grid-column: 6;
    font-size: 11px; min-width: 0;
  }
  .cmd-status.Pending { color: var(--questionable); }
  .cmd-status.Executing { color: var(--accent); }
  .cmd-status.Success { color: var(--good); }
  .cmd-status.Failed { color: var(--bad); }
  .cmd-status.Idle { color: var(--text-muted); }
  .cmd-time {
    grid-column: 8;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
  }
  .category-tag {
    font-size: 10px; padding: 2px 6px; border-radius: 3px;
    font-weight: 600; margin-left: 4px;
  }
  .category-telecontrol { background: rgba(79,195,247,0.2); color: var(--accent); }
  .category-setting { background: rgba(255,152,0,0.2); color: var(--questionable); }
</style>
</head>
<body>
<div class="layout-shell">
<div class="site-header">
  <h1 id="site-title">OpenEMS</h1>
  <div class="site-info">
    <span id="site-id"></span>
    <span id="site-name"></span>
  </div>
  <div class="header-actions">
    <a class="header-link" href="/history">History</a>
    <a class="header-link" href="/config">Config Console</a>
  </div>
</div>

<div class="status-bar">
  <span class="conn-dot wait" id="conn-dot"></span>
  <span id="conn-text">Connecting...</span>
  <span>|</span>
  <span>Seq: <strong id="seq-num">-</strong></span>
  <span>|</span>
  <span>Last update: <strong id="last-update">-</strong></span>
</div>

<div class="alarm-panel">
  <div class="alarm-panel-header">
    <span class="alarm-panel-title">Active Alarms</span>
    <span class="alarm-count" id="alarm-count">0 active</span>
  </div>
  <div id="alarm-body" class="alarm-empty">无活动告警</div>
</div>

<div class="error-overlay" id="error-overlay"></div>

<div class="main-grid" id="main-grid">
  <div class="no-data" id="no-data">
    <h2>Waiting for data...</h2>
    <p>Make sure openems-modbus-collector is running</p>
  </div>
</div>
</div>

<script>
const REFRESH_MS = 1000;
const DEVICE_TYPE_ICONS = { PV: "☀", BESS: "🔋", Grid: "⚡" };
const CMD_POLL_MS = 500;
const pendingCommands = {};  // point_id → { status, interval }
const inputDrafts = {};      // point_id → current text in input
const commandTimes = {};     // point_id → formatted time text

function qualityClass(q) { return "quality-" + (q || "Invalid"); }
function tiStateDot(code) {
  if (code === 1) return "on";
  if (code === 0) return "off";
  return "unknown";
}

function categoryTag(cat) {
  if (cat === "telecontrol") return '<span class="category-tag category-telecontrol">遥控</span>';
  if (cat === "teleadjust") return '<span class="category-tag category-setting">遥调</span>';
  return '';
}

function formatDateTime(tsMs) {
  if (!tsMs) return "-";
  const d = new Date(tsMs);
  if (Number.isNaN(d.getTime())) return "-";
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  const ss = String(d.getSeconds()).padStart(2, "0");
  return `${yyyy}-${mm}-${dd} ${hh}:${mi}:${ss}`;
}

function snapshotInputState() {
  const active = document.activeElement;
  const focusedPointId = active && active.classList && active.classList.contains("cmd-input")
    ? active.id.replace("cmd-input-", "")
    : null;

  document.querySelectorAll(".cmd-input").forEach((input) => {
    const pointId = input.id.replace("cmd-input-", "");
    inputDrafts[pointId] = input.value;
  });

  return focusedPointId;
}

function restoreInputState(focusedPointId) {
  Object.entries(inputDrafts).forEach(([pointId, value]) => {
    const input = document.getElementById("cmd-input-" + pointId);
    if (input && input.value !== value) {
      input.value = value;
    }
  });

  if (focusedPointId) {
    const focusedInput = document.getElementById("cmd-input-" + focusedPointId);
    if (focusedInput) {
      focusedInput.focus();
      if (typeof focusedInput.setSelectionRange === "function" && focusedInput.type !== "number") {
        const len = focusedInput.value.length;
        focusedInput.setSelectionRange(len, len);
      }
    }
  }
}

function buildCards(points) {
  const focusedPointId = snapshotInputState();

  // Group points by device
  const devices = {};
  for (const p of points) {
    if (!devices[p.device]) devices[p.device] = [];
    devices[p.device].push(p);
  }

  const grid = document.getElementById("main-grid");

  if (Object.keys(devices).length === 0) {
    grid.innerHTML = '<div class="no-data"><h2>Waiting for data...</h2><p>Make sure openems-modbus-collector is running</p></div>';
    return;
  }

  // Build all cards every time — simple and reliable
  let cardsHtml = "";
  const devKeys = Object.keys(devices).sort();

  for (const did of devKeys) {
    let type = did.split("-")[0].toUpperCase();
    let icon = DEVICE_TYPE_ICONS[type] || "📋";
    let bodyHtml = "";

    for (const p of devices[did]) {
      if (p.writable) {
        // Writable point — show command UI
        const valClass = p.valid ? "value-valid" : "value-invalid";
        const v = p.valid ? formatValue(p.value) : "---";
        let cmdStatusHtml = "";
        if (pendingCommands[p.id]) {
          cmdStatusHtml = `<span class="cmd-status ${pendingCommands[p.id].status}">${pendingCommands[p.id].status}</span>`;
        }
        const cmdTimeHtml = `<span class="cmd-time">${commandTimes[p.id] || ""}</span>`;
        bodyHtml += `<div class="cmd-row">
          <span class="cmd-label">${p.id}${categoryTag(p.category)}</span>
          <span class="cmd-value ${valClass}">${v}</span>
          <span class="cmd-unit">${p.unit || ""}</span>
          <input class="cmd-input" type="number" id="cmd-input-${p.id}" placeholder="值" step="any">
          <button class="cmd-btn" onclick="submitCommand('${p.id}')">执行</button>
          ${cmdStatusHtml}
          <span class="point-quality ${qualityClass(p.quality)}">${p.quality}</span>
          ${cmdTimeHtml}
        </div>`;
      } else if (p.category === "telemetry" || p.category === "telecontrol" || p.category === "teleadjust") {
        const valClass = p.valid ? "value-valid" : "value-invalid";
        const v = p.valid ? formatValue(p.value) : "---";
        bodyHtml += `<div class="point-row">
          <span class="point-label">${p.id}${categoryTag(p.category)}</span>
          <span class="point-value ${valClass}">${v}</span>
          <span class="point-unit">${p.unit || ""}</span>
          <span class="point-quality ${qualityClass(p.quality)}">${p.quality}</span>
          <span class="point-ts">${formatDateTime(p.timestamp)}</span>
        </div>`;
      } else {
        const dotClass = p.valid ? tiStateDot(p.state_code) : "unknown";
        const label = p.valid ? (p.state_code === 1 ? "Running" : "Stopped") : "---";
        bodyHtml += `<div class="point-row">
          <span class="point-label">${p.id}</span>
          <span class="ti-state">
            <span class="ti-dot ${dotClass}"></span>
            <span class="ti-code ${p.valid ? 'value-valid' : 'value-invalid'}">${p.state_code} (${label})</span>
          </span>
          <span class="point-quality ${qualityClass(p.quality)}">${p.quality}</span>
          <span class="point-ts">${formatDateTime(p.timestamp)}</span>
        </div>`;
      }
    }

    cardsHtml += `<div class="device-card">
      <div class="device-card-header">
        <span class="device-icon">${icon}</span>
        <span class="device-name" data-did="${did}">${did}</span>
        <span class="device-id">${did}</span>
      </div>
      <div class="device-card-body">${bodyHtml}</div>
    </div>`;
  }

  grid.innerHTML = cardsHtml;

  // Update device names from loaded config
  if (deviceNames) {
    for (const did of devKeys) {
      const el = grid.querySelector(`[data-did="${did}"]`);
      if (el && deviceNames[did]) el.textContent = deviceNames[did];
    }
  }

  restoreInputState(focusedPointId);
}

function formatValue(v) {
  if (typeof v !== "number") return "---";
  if (Math.abs(v) >= 1000) return v.toFixed(1);
  if (Math.abs(v) >= 1) return v.toFixed(2);
  if (Math.abs(v) >= 0.01) return v.toFixed(3);
  return v.toFixed(4);
}

function formatAlarmValue(alarm) {
  if (typeof alarm.value !== "number") return "-";
  const value = formatValue(alarm.value);
  return alarm.unit ? `${value} ${alarm.unit}` : value;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderAlarms(data) {
  const countEl = document.getElementById("alarm-count");
  const bodyEl = document.getElementById("alarm-body");
  const alarms = Array.isArray(data && data.alarms) ? data.alarms : [];

  countEl.textContent = `${alarms.length} active`;
  if (alarms.length === 0) {
    bodyEl.className = "alarm-empty";
    bodyEl.textContent = data && data.error ? "告警文件暂不可读" : "无活动告警";
    return;
  }

  bodyEl.className = "alarm-list";
  bodyEl.innerHTML = alarms.map((alarm) => {
    const level = alarm.level || "warning";
    return `<div class="alarm-row">
      <span class="alarm-level ${escapeHtml(level)}">${escapeHtml(level)}</span>
      <span class="alarm-point">${escapeHtml(alarm.point_id || "-")}</span>
      <span class="alarm-msg">${escapeHtml(alarm.message || "-")}</span>
      <span class="alarm-value">${escapeHtml(formatAlarmValue(alarm))}</span>
      <span class="alarm-time">${formatDateTime(alarm.trigger_time)}</span>
    </div>`;
  }).join("");
}

async function refreshAlarms() {
  try {
    const resp = await fetch("/api/alarms/active");
    const data = await resp.json();
    renderAlarms(data);
  } catch (e) {
    renderAlarms({ error: e.message, alarms: [] });
  }
}

async function submitCommand(pointId) {
  const input = document.getElementById("cmd-input-" + pointId);
  if (!input) return;
  inputDrafts[pointId] = input.value;
  const value = parseFloat(input.value);
  if (isNaN(value)) {
    alert("请输入有效数值");
    return;
  }

  try {
    const resp = await fetch("/api/command", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ point_id: pointId, desired_value: value }),
    });
    const data = await resp.json();
    if (data.error) {
      alert("命令提交失败: " + data.error);
      return;
    }

    // Start polling command status
    if (!pendingCommands[pointId]) {
      pendingCommands[pointId] = { status: "Pending", interval: null };
    }
    pendingCommands[pointId].status = "Pending";
    commandTimes[pointId] = formatDateTime(Date.now());
    if (pendingCommands[pointId].interval) clearInterval(pendingCommands[pointId].interval);
    pendingCommands[pointId].interval = setInterval(() => pollCommandStatus(pointId), CMD_POLL_MS);

    input.value = "";
    inputDrafts[pointId] = "";
  } catch (e) {
    alert("网络错误: " + e.message);
  }
}

async function pollCommandStatus(pointId) {
  try {
    const resp = await fetch("/api/command/" + pointId);
    const data = await resp.json();
    if (data.error) return;

    pendingCommands[pointId].status = data.status;
    commandTimes[pointId] = formatDateTime(data.complete_time || data.submit_time);

    if (data.status === "Success" || data.status === "Failed" || data.status === "Idle") {
      if (pendingCommands[pointId].interval) {
        clearInterval(pendingCommands[pointId].interval);
        pendingCommands[pointId].interval = null;
      }
      // Clear status after 3 seconds
      if (data.status === "Success" || data.status === "Failed") {
        setTimeout(() => {
          pendingCommands[pointId].status = "Idle";
        }, 3000);
      }
    }
  } catch (_) {}
}

async function refresh() {
  const dot = document.getElementById("conn-dot");
  const text = document.getElementById("conn-text");
  const overlay = document.getElementById("error-overlay");

  try {
    const resp = await fetch("/api/snapshot");
    if (!resp.ok) {
      let msg = "Server error";
      try { const d = await resp.json(); msg = d.error || msg; } catch(_) {}
      dot.className = "conn-dot wait";
      text.textContent = "Waiting for collector";
      overlay.textContent = msg;
      overlay.style.display = "block";
      return;
    }
    const data = await resp.json();

    if (data.error) {
      dot.className = "conn-dot wait";
      text.textContent = "Waiting for collector";
      overlay.textContent = data.error;
      overlay.style.display = "block";
      return;
    }

    overlay.style.display = "none";
    dot.className = "conn-dot ok";
    text.textContent = "Connected";

    document.getElementById("site-title").textContent = "OpenEMS Dashboard";
    document.getElementById("site-id").textContent = data.site_id || "";
    document.getElementById("site-name").textContent = data.site_name || "";
    document.getElementById("seq-num").textContent = data.update_seq || "-";
    document.getElementById("last-update").textContent = formatDateTime(data.last_update_time);

    if (data.points && data.points.length > 0) {
      buildCards(data.points);
    }

  } catch (e) {
    dot.className = "conn-dot err";
    text.textContent = "Connection failed";
    overlay.textContent = "Cannot reach server: " + e.message;
    overlay.style.display = "block";
  }
}

// Load device names from config
let deviceNames = {};
async function loadConfig() {
  try {
    const resp = await fetch("/api/config");
    if (!resp.ok) return;
    const cfg = await resp.json();
    if (cfg.devices) {
      for (const d of cfg.devices) {
        deviceNames[d.id] = d.name || d.id;
      }
    }
  } catch (_) {}
}

// Start polling
refresh();
refreshAlarms();
loadConfig();
setInterval(() => {
  refresh();
  refreshAlarms();
}, REFRESH_MS);
</script>
