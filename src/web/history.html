<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenEMS History</title>
<style>
  :root {
    --bg: #1a1d23;
    --card-bg: #22262e;
    --border: #3a3f4a;
    --text: #e0e4eb;
    --text-muted: #8a8f9a;
    --accent: #4fc3f7;
    --good: #4caf50;
    --bad: #f44336;
    --header-bg: #0d1117;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--header-bg);
    border-bottom: 2px solid var(--accent);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header h1 {
    font-size: 22px;
    color: var(--accent);
  }
  .header a {
    margin-left: auto;
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(79,195,247,0.35);
    border-radius: 999px;
    padding: 7px 12px;
  }
  .page {
    padding: 20px 24px;
    max-width: 1180px;
  }
  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .panel-header {
    background: #2c3040;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
  }
  .panel-body {
    padding: 16px;
  }
  .controls {
    display: grid;
    grid-template-columns: 280px 210px 210px 120px;
    gap: 12px;
    align-items: end;
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  select, input {
    width: 100%;
    background: #111722;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 13px;
  }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 9px 14px;
    font-weight: 700;
    cursor: pointer;
  }
  button:disabled {
    background: var(--text-muted);
    cursor: not-allowed;
  }
  .status {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 13px;
  }
  canvas {
    width: 100%;
    height: 320px;
    display: block;
    background: #161a22;
    border: 1px solid #2a2e36;
    border-radius: 6px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #2a2e36;
    text-align: left;
  }
  th {
    color: var(--text-muted);
    font-weight: 700;
  }
  .quality-Good { color: var(--good); }
  .quality-Bad, .quality-Invalid { color: var(--bad); }
  .muted { color: var(--text-muted); }
</style>
</head>
<body>
<div class="header">
  <h1>OpenEMS History</h1>
  <a href="/">Back to Dashboard</a>
</div>

<main class="page">
  <section class="panel">
    <div class="panel-header">Query</div>
    <div class="panel-body">
      <div class="controls">
        <div>
          <label for="point-select">Point</label>
          <select id="point-select"></select>
        </div>
        <div>
          <label for="start-input">Start</label>
          <input id="start-input" type="datetime-local">
        </div>
        <div>
          <label for="end-input">End</label>
          <input id="end-input" type="datetime-local">
        </div>
        <button id="query-btn" onclick="queryHistory()">Query</button>
      </div>
      <div class="status" id="status">Loading points...</div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">Trend</div>
    <div class="panel-body">
      <canvas id="chart" width="1100" height="320"></canvas>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">Rows</div>
    <div class="panel-body">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Value</th>
            <th>Quality</th>
            <th>Valid</th>
          </tr>
        </thead>
        <tbody id="rows-body">
          <tr><td colspan="4" class="muted">暂无历史数据</td></tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<script>
let points = [];
let currentUnit = "";

function pad2(v) {
  return String(v).padStart(2, "0");
}

function toLocalInputValue(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function fromLocalInputValue(value) {
  const ts = new Date(value).getTime();
  return Number.isNaN(ts) ? null : ts;
}

function formatDateTime(ts) {
  if (!ts) return "-";
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) return "-";
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}

function formatValue(value) {
  if (typeof value !== "number") return "-";
  if (Math.abs(value) >= 1000) return value.toFixed(1);
  if (Math.abs(value) >= 1) return value.toFixed(2);
  if (Math.abs(value) >= 0.01) return value.toFixed(3);
  return value.toFixed(4);
}

function setDefaultRange() {
  const end = Date.now();
  const start = end - 3600 * 1000;
  document.getElementById("start-input").value = toLocalInputValue(start);
  document.getElementById("end-input").value = toLocalInputValue(end);
}

async function loadPoints() {
  const status = document.getElementById("status");
  try {
    const resp = await fetch("/api/history/points");
    const data = await resp.json();
    points = data.points || [];
    const select = document.getElementById("point-select");
    select.innerHTML = points.map((p) => {
      const label = `${p.id} (${p.category}${p.unit ? ", " + p.unit : ""})`;
      return `<option value="${p.id}">${label}</option>`;
    }).join("");
    status.textContent = points.length ? "Ready." : "No points in config.";
    if (points.length) queryHistory();
  } catch (e) {
    status.textContent = "Failed to load points: " + e.message;
  }
}

function drawChart(rows) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "#161a22";
  ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = "#2a2e36";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = 24 + i * ((h - 48) / 4);
    ctx.beginPath();
    ctx.moveTo(48, y);
    ctx.lineTo(w - 20, y);
    ctx.stroke();
  }

  const validRows = rows.filter((r) => r.valid && typeof r.value === "number");
  if (validRows.length === 0) {
    ctx.fillStyle = "#8a8f9a";
    ctx.fillText("暂无历史数据", 52, 48);
    return;
  }

  const minTs = validRows[0].ts;
  const maxTs = validRows[validRows.length - 1].ts;
  let minVal = Math.min(...validRows.map((r) => r.value));
  let maxVal = Math.max(...validRows.map((r) => r.value));
  if (minVal === maxVal) {
    minVal -= 1;
    maxVal += 1;
  }

  const xFor = (ts) => 48 + ((ts - minTs) / Math.max(1, maxTs - minTs)) * (w - 68);
  const yFor = (value) => h - 24 - ((value - minVal) / (maxVal - minVal)) * (h - 48);

  ctx.fillStyle = "#8a8f9a";
  ctx.fillText(`${formatValue(maxVal)} ${currentUnit}`, 8, 30);
  ctx.fillText(`${formatValue(minVal)} ${currentUnit}`, 8, h - 24);

  ctx.strokeStyle = "#4fc3f7";
  ctx.lineWidth = 2;
  ctx.beginPath();
  validRows.forEach((row, index) => {
    const x = xFor(row.ts);
    const y = yFor(row.value);
    if (index === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  ctx.fillStyle = "#4fc3f7";
  validRows.forEach((row) => {
    const x = xFor(row.ts);
    const y = yFor(row.value);
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

function renderRows(rows) {
  const body = document.getElementById("rows-body");
  if (!rows.length) {
    body.innerHTML = '<tr><td colspan="4" class="muted">暂无历史数据</td></tr>';
    return;
  }
  body.innerHTML = rows.slice().reverse().map((row) => {
    const value = `${formatValue(row.value)}${currentUnit ? " " + currentUnit : ""}`;
    const quality = row.quality || "Unknown";
    return `<tr>
      <td>${formatDateTime(row.ts)}</td>
      <td>${value}</td>
      <td class="quality-${quality}">${quality}</td>
      <td>${row.valid ? "true" : "false"}</td>
    </tr>`;
  }).join("");
}

async function queryHistory() {
  const btn = document.getElementById("query-btn");
  const status = document.getElementById("status");
  const pointId = document.getElementById("point-select").value;
  const start = fromLocalInputValue(document.getElementById("start-input").value);
  const end = fromLocalInputValue(document.getElementById("end-input").value);
  if (!pointId || start === null || end === null) return;

  const point = points.find((p) => p.id === pointId);
  currentUnit = point ? point.unit || "" : "";
  btn.disabled = true;
  status.textContent = "Querying...";
  try {
    const url = `/api/history/query?point_id=${encodeURIComponent(pointId)}&start=${start}&end=${end}&limit=5000`;
    const resp = await fetch(url);
    const data = await resp.json();
    const rows = data.rows || [];
    drawChart(rows);
    renderRows(rows);
    status.textContent = `Loaded ${rows.length} rows.`;
  } catch (e) {
    status.textContent = "Query failed: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

setDefaultRange();
loadPoints();
</script>
</body>
</html>
