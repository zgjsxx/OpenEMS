<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenEMS History</title>
<style>
  :root {
    --bg: #1a1d23;
    --card-bg: #22262e;
    --border: #3a3f4a;
    --text: #e0e4eb;
    --text-muted: #8a8f9a;
    --accent: #4fc3f7;
    --good: #4caf50;
    --bad: #f44336;
    --header-bg: #0d1117;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: var(--header-bg);
    border-bottom: 2px solid var(--accent);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .header h1 {
    font-size: 22px;
    color: var(--accent);
  }
  .header a {
    margin-left: auto;
    color: var(--accent);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid rgba(79,195,247,0.35);
    border-radius: 999px;
    padding: 7px 12px;
  }
  .page {
    padding: 20px 24px;
    max-width: 1180px;
  }
  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .panel-header {
    background: #2c3040;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-weight: 700;
  }
  .panel-body {
    padding: 16px;
  }
  .controls {
    display: grid;
    grid-template-columns: 280px 210px 210px auto;
    gap: 12px;
    align-items: end;
  }
  .quick-range {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .quick-range button {
    padding: 5px 10px;
    font-size: 12px;
    background: #2c3040;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .quick-range button:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  select, input {
    width: 100%;
    background: #111722;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 8px 10px;
    font-size: 13px;
  }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 9px 14px;
    font-weight: 700;
    cursor: pointer;
  }
  button:disabled {
    background: var(--text-muted);
    cursor: not-allowed;
  }
  .status {
    margin-top: 12px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .chart-wrap {
    position: relative;
  }
  .chart-wrap canvas {
    width: 100%;
    height: 320px;
    display: block;
    background: #161a22;
    border: 1px solid #2a2e36;
    border-radius: 6px;
  }
  .tooltip {
    position: absolute;
    display: none;
    background: #2c3040;
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text);
    pointer-events: none;
    white-space: nowrap;
    z-index: 10;
  }
  .tooltip .tt-time { color: var(--text-muted); }
  .tooltip .tt-val { color: var(--accent); font-weight: 700; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 8px 10px;
    border-bottom: 1px solid #2a2e36;
    text-align: left;
  }
  th {
    color: var(--text-muted);
    font-weight: 700;
  }
  .quality-Good { color: var(--good); }
  .quality-Bad, .quality-Invalid { color: var(--bad); }
  .muted { color: var(--text-muted); }
  .pagination {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .pagination button {
    padding: 5px 10px;
    font-size: 12px;
  }
  .pagination button:disabled {
    opacity: 0.4;
  }
</style>
</head>
<body>
<div class="header">
  <h1>OpenEMS History</h1>
  <a href="/">Back to Dashboard</a>
</div>

<main class="page">
  <section class="panel">
    <div class="panel-header">Query</div>
    <div class="panel-body">
      <div class="controls">
        <div>
          <label for="point-select">Point</label>
          <select id="point-select"></select>
        </div>
        <div>
          <label for="start-input">Start</label>
          <input id="start-input" type="datetime-local">
        </div>
        <div>
          <label for="end-input">End</label>
          <input id="end-input" type="datetime-local">
        </div>
        <button id="query-btn" onclick="queryHistory()">Query</button>
      </div>
      <div class="quick-range">
        <button onclick="setRange(10)">10 min</button>
        <button onclick="setRange(30)">30 min</button>
        <button onclick="setRange(60)">1 hour</button>
        <button onclick="setRange(360)">6 hour</button>
        <button onclick="setRange(720)">12 hour</button>
        <button onclick="setRangeToday()">Today</button>
      </div>
      <div class="status" id="status">Loading points...</div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">Trend</div>
    <div class="panel-body">
      <div class="chart-wrap">
        <canvas id="chart" width="1100" height="320"></canvas>
        <div class="tooltip" id="tooltip">
          <div class="tt-time" id="tt-time"></div>
          <div class="tt-val" id="tt-val"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="panel">
    <div class="panel-header">Rows</div>
    <div class="panel-body">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Value</th>
            <th>Quality</th>
            <th>Valid</th>
          </tr>
        </thead>
        <tbody id="rows-body">
          <tr><td colspan="4" class="muted">暂无历史数据</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>
</main>

<script>
let points = [];
let currentUnit = "";
let allRows = [];
let currentPage = 1;
const PAGE_SIZE = 50;

// ---- chart state for hover ----
let chartValidRows = [];
let chartMinTs = 0, chartMaxTs = 0, chartMinVal = 0, chartMaxVal = 0;
const CHART_PAD_LEFT = 58, CHART_PAD_RIGHT = 20, CHART_PAD_TOP = 24, CHART_PAD_BOTTOM = 36;
const CHART_PLOT_W = 1100 - CHART_PAD_LEFT - CHART_PAD_RIGHT;
const CHART_PLOT_H = 320 - CHART_PAD_TOP - CHART_PAD_BOTTOM;

function pad2(v) {
  return String(v).padStart(2, "0");
}

function toLocalInputValue(ts) {
  const d = new Date(ts);
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}T${pad2(d.getHours())}:${pad2(d.getMinutes())}`;
}

function fromLocalInputValue(value) {
  const ts = new Date(value).getTime();
  return Number.isNaN(ts) ? null : ts;
}

function formatDateTime(ts) {
  if (!ts) return "-";
  const d = new Date(ts);
  if (Number.isNaN(d.getTime())) return "-";
  return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}

function formatTimeShort(ts) {
  const d = new Date(ts);
  return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
}

function formatDateShort(ts) {
  const d = new Date(ts);
  return `${pad2(d.getMonth() + 1)}/${pad2(d.getDate())}`;
}

function formatValue(value) {
  if (typeof value !== "number") return "-";
  if (Math.abs(value) >= 1000) return value.toFixed(1);
  if (Math.abs(value) >= 1) return value.toFixed(2);
  if (Math.abs(value) >= 0.01) return value.toFixed(3);
  return value.toFixed(4);
}

function setDefaultRange() {
  const end = Date.now();
  const start = end - 3600 * 1000;
  document.getElementById("start-input").value = toLocalInputValue(start);
  document.getElementById("end-input").value = toLocalInputValue(end);
}

function setRange(minutes) {
  const end = Date.now();
  const start = end - minutes * 60 * 1000;
  document.getElementById("start-input").value = toLocalInputValue(start);
  document.getElementById("end-input").value = toLocalInputValue(end);
  queryHistory();
}

function setRangeToday() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  document.getElementById("start-input").value = toLocalInputValue(start);
  document.getElementById("end-input").value = toLocalInputValue(now.getTime());
  queryHistory();
}

async function loadPoints() {
  const status = document.getElementById("status");
  try {
    const resp = await fetch("/api/history/points");
    const data = await resp.json();
    points = data.points || [];
    const select = document.getElementById("point-select");
    select.innerHTML = points.map((p) => {
      const label = `${p.id} (${p.category}${p.unit ? ", " + p.unit : ""})`;
      return `<option value="${p.id}">${label}</option>`;
    }).join("");
    status.textContent = points.length ? "Ready." : "No points in config.";
    if (points.length) queryHistory();
  } catch (e) {
    status.textContent = "Failed to load points: " + e.message;
  }
}

// ---- X axis time tick helper ----
function pickTickInterval(rangeMs) {
  const candidates = [60000, 300000, 600000, 1800000, 3600000, 7200000, 21600000, 86400000];
  // aim for ~5-8 ticks across the range
  for (const iv of candidates) {
    if (rangeMs / iv >= 4 && rangeMs / iv <= 10) return iv;
  }
  return 3600000; // fallback 1h
}

function formatTickLabel(ts, rangeMs) {
  if (rangeMs >= 86400000) {
    return formatDateShort(ts) + " " + formatTimeShort(ts);
  }
  if (rangeMs >= 3600000) {
    return formatTimeShort(ts);
  }
  return formatTimeShort(ts);
}

function drawChart(rows) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = "#161a22";
  ctx.fillRect(0, 0, w, h);

  // Y axis grid lines
  ctx.strokeStyle = "#2a2e36";
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = CHART_PAD_TOP + i * (CHART_PLOT_H / 4);
    ctx.beginPath();
    ctx.moveTo(CHART_PAD_LEFT, y);
    ctx.lineTo(w - CHART_PAD_RIGHT, y);
    ctx.stroke();
  }

  chartValidRows = rows.filter((r) => r.valid && typeof r.value === "number");
  if (chartValidRows.length === 0) {
    ctx.fillStyle = "#8a8f9a";
    ctx.font = "13px sans-serif";
    ctx.fillText("暂无历史数据", CHART_PAD_LEFT + 4, CHART_PAD_TOP + 20);
    chartMinTs = 0; chartMaxTs = 0;
    return;
  }

  chartMinTs = chartValidRows[0].ts;
  chartMaxTs = chartValidRows[chartValidRows.length - 1].ts;
  let minVal = Math.min(...chartValidRows.map((r) => r.value));
  let maxVal = Math.max(...chartValidRows.map((r) => r.value));
  if (minVal === maxVal) { minVal -= 1; maxVal += 1; }
  chartMinVal = minVal;
  chartMaxVal = maxVal;

  const xFor = (ts) => CHART_PAD_LEFT + ((ts - chartMinTs) / Math.max(1, chartMaxTs - chartMinTs)) * CHART_PLOT_W;
  const yFor = (value) => CHART_PAD_TOP + CHART_PLOT_H - ((value - minVal) / (maxVal - minVal)) * CHART_PLOT_H;

  // Y axis labels
  ctx.fillStyle = "#8a8f9a";
  ctx.font = "11px sans-serif";
  ctx.textAlign = "right";
  for (let i = 0; i <= 4; i++) {
    const val = maxVal - i * ((maxVal - minVal) / 4);
    const y = yFor(val);
    ctx.fillText(formatValue(val), CHART_PAD_LEFT - 6, y + 4);
  }
  ctx.textAlign = "left";

  // X axis time ticks
  const rangeMs = chartMaxTs - chartMinTs;
  const tickIv = pickTickInterval(rangeMs);
  ctx.fillStyle = "#8a8f9a";
  ctx.font = "11px sans-serif";
  const firstTick = Math.ceil(chartMinTs / tickIv) * tickIv;
  for (let tickTs = firstTick; tickTs <= chartMaxTs; tickTs += tickIv) {
    const x = xFor(tickTs);
    ctx.fillText(formatTickLabel(tickTs, rangeMs), x, h - CHART_PAD_BOTTOM + 16);
    // vertical dashed tick line
    ctx.strokeStyle = "#2a2e3644";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x, CHART_PAD_TOP);
    ctx.lineTo(x, CHART_PAD_TOP + CHART_PLOT_H);
    ctx.stroke();
  }

  // Trend line
  ctx.strokeStyle = "#4fc3f7";
  ctx.lineWidth = 2;
  ctx.beginPath();
  chartValidRows.forEach((row, index) => {
    const x = xFor(row.ts);
    const y = yFor(row.value);
    if (index === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Data dots (skip when too dense)
  const dotSkip = chartValidRows.length > 200 ? Math.ceil(chartValidRows.length / 200) : 1;
  ctx.fillStyle = "#4fc3f7";
  chartValidRows.forEach((row, i) => {
    if (i % dotSkip !== 0 && i !== chartValidRows.length - 1) return;
    const x = xFor(row.ts);
    const y = yFor(row.value);
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ---- Hover tooltip ----
function xToTs(canvasX) {
  if (chartMaxTs <= chartMinTs) return null;
  const frac = (canvasX - CHART_PAD_LEFT) / CHART_PLOT_W;
  if (frac < 0 || frac > 1) return null;
  return chartMinTs + frac * (chartMaxTs - chartMinTs);
}

function canvasCoords(e) {
  const canvas = document.getElementById("chart");
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

document.addEventListener("mousemove", function(e) {
  const tooltip = document.getElementById("tooltip");
  if (!chartValidRows.length) { tooltip.style.display = "none"; return; }

  const { x } = canvasCoords(e);
  const ts = xToTs(x);
  if (ts === null) { tooltip.style.display = "none"; return; }

  // find nearest valid row
  let nearest = chartValidRows[0];
  for (const row of chartValidRows) {
    if (Math.abs(row.ts - ts) < Math.abs(nearest.ts - ts)) nearest = row;
  }

  document.getElementById("tt-time").textContent = formatDateTime(nearest.ts);
  document.getElementById("tt-val").textContent = formatValue(nearest.value) + (currentUnit ? " " + currentUnit : "") + "  " + (nearest.quality || "");

  const wrapRect = document.querySelector(".chart-wrap").getBoundingClientRect();
  const canvasRect = document.getElementById("chart").getBoundingClientRect();
  // position tooltip near cursor, in CSS pixels relative to .chart-wrap
  let left = e.clientX - wrapRect.left + 12;
  let top = e.clientY - wrapRect.top - 10;
  // keep inside chart-wrap
  if (left + 160 > wrapRect.width) left = e.clientX - wrapRect.left - 160;
  if (top < 0) top = 4;

  tooltip.style.display = "block";
  tooltip.style.left = left + "px";
  tooltip.style.top = top + "px";
});

document.addEventListener("mouseleave", function(e) {
  if (!e.target.closest || !e.target.closest(".chart-wrap")) {
    document.getElementById("tooltip").style.display = "none";
  }
});

// ---- Table pagination ----
function renderPage() {
  const totalPages = Math.max(1, Math.ceil(allRows.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  const startIdx = allRows.length - (currentPage * PAGE_SIZE); // rows are ascending, show newest first
  const endIdx = allRows.length - ((currentPage - 1) * PAGE_SIZE);
  const pageRows = allRows.slice(Math.max(0, startIdx), Math.min(allRows.length, endIdx));

  const body = document.getElementById("rows-body");
  if (!allRows.length) {
    body.innerHTML = '<tr><td colspan="4" class="muted">暂无历史数据</td></tr>';
    document.getElementById("pagination").innerHTML = "";
    return;
  }
  body.innerHTML = pageRows.reverse().map((row) => {
    const value = `${formatValue(row.value)}${currentUnit ? " " + currentUnit : ""}`;
    const quality = row.quality || "Unknown";
    return `<tr>
      <td>${formatDateTime(row.ts)}</td>
      <td>${value}</td>
      <td class="quality-${quality}">${quality}</td>
      <td>${row.valid ? "true" : "false"}</td>
    </tr>`;
  }).join("");

  const pag = document.getElementById("pagination");
  pag.innerHTML = `
    <button ${currentPage <= 1 ? "disabled" : ""} onclick="goPage(${currentPage - 1})">Prev</button>
    <span>${currentPage} / ${totalPages}  (total ${allRows.length} rows)</span>
    <button ${currentPage >= totalPages ? "disabled" : ""} onclick="goPage(${currentPage + 1})">Next</button>
  `;
}

function goPage(p) {
  currentPage = p;
  renderPage();
}

async function queryHistory() {
  const btn = document.getElementById("query-btn");
  const status = document.getElementById("status");
  const pointId = document.getElementById("point-select").value;
  const start = fromLocalInputValue(document.getElementById("start-input").value);
  const end = fromLocalInputValue(document.getElementById("end-input").value);
  if (!pointId || start === null || end === null) return;

  const point = points.find((p) => p.id === pointId);
  currentUnit = point ? point.unit || "" : "";
  btn.disabled = true;
  status.textContent = "Querying...";
  currentPage = 1;
  try {
    const url = `/api/history/query?point_id=${encodeURIComponent(pointId)}&start=${start}&end=${end}&limit=5000`;
    const resp = await fetch(url);
    const data = await resp.json();
    allRows = data.rows || [];
    drawChart(allRows);
    renderPage();
    status.textContent = `Loaded ${allRows.length} rows.`;
  } catch (e) {
    status.textContent = "Query failed: " + e.message;
  } finally {
    btn.disabled = false;
  }
}

setDefaultRange();
loadPoints();
</script>
</body>
</html>
